<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OChem Lab – Structure Builder &amp; Reagent Identifier</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<header>
  <span class="logo">🧪</span>
  <h1>OChem Lab</h1>
  <button class="nav-btn secondary" id="nav-reagents">Reagents</button>
  <button class="nav-btn primary"   id="nav-builder">Structure Builder</button>
</header>

<main>

  <!-- ══════════════════════════════════════════════════════════════════════
       STRUCTURE BUILDER VIEW
  ══════════════════════════════════════════════════════════════════════════ -->
  <div id="view-builder" class="view active">

    <!-- Tool palette -->
    <div class="tool-palette">
      <button class="tool-btn active" data-tool="C">
        <span class="tool-icon">C</span>CARBON
      </button>
      <button class="tool-btn" data-tool="N">
        <span class="tool-icon">N</span>NITROGEN
      </button>
      <button class="tool-btn" data-tool="Cl">
        <span class="tool-icon">Cl</span>CHLORINE
      </button>
      <button class="tool-btn" data-tool="OH">
        <span class="tool-icon">OH</span>HYDROXYL
      </button>

      <button class="tool-btn" data-tool="SINGLE">
        <span class="tool-icon">—</span>SINGLE
      </button>
      <button class="tool-btn" data-tool="DOUBLE">
        <span class="tool-icon">=</span>DOUBLE
      </button>
      <button class="tool-btn" data-tool="TRIPLE">
        <span class="tool-icon">≡</span>TRIPLE
      </button>

      <button class="tool-btn" data-tool="REACTION">
        <span class="tool-icon">→</span>REACTION
      </button>
      <button class="tool-btn delete-btn" data-tool="DELETE">
        <span class="tool-icon">✕</span>DELETE
      </button>

      <button class="tool-btn clear-btn" id="btn-clear-canvas">
        <span class="tool-icon">🗑</span>CLEAR CANVAS
      </button>
    </div>

    <!-- Drawing canvas -->
    <div class="builder-canvas-wrap">
      <canvas id="builder-canvas" width="660" height="420"></canvas>

      <!-- SMILES bar -->
      <div class="smiles-bar">
        <label>
          <input type="checkbox" id="debug-checkbox" />
          Debug (atom indices)
        </label>
        <span class="smiles-label">SMILES</span>
        <span id="smiles-display"></span>
        <button id="copy-smiles">Copy</button>
      </div>
    </div>

  </div><!-- /view-builder -->

  <!-- ══════════════════════════════════════════════════════════════════════
       REAGENTS VIEW
  ══════════════════════════════════════════════════════════════════════════ -->
  <div id="view-reagents" class="view">

    <div class="reagent-header">
      <div>
        <div class="reagent-label">Reaction Engine</div>
        <div class="reagent-name">NaBH4</div>
      </div>
      <button class="btn-generate" id="btn-generate">Generate Products</button>
    </div>

    <div id="reaction-result"></div>

  </div><!-- /view-reagents -->

</main>

<footer>
  OChem Lab &copy; 2024
</footer>

<!-- ── Core chemistry libraries ──────────────────────────────────────────── -->
<script src="js/smiles.js"></script>
<script src="js/aromatic.js"></script>
<script src="js/renderer.js"></script>
<script src="js/smiles-generator.js"></script>
<script src="js/reaction-engine.js"></script>
<script src="js/structure-builder.js"></script>

<!-- ── App bootstrap ─────────────────────────────────────────────────────── -->
<script>
(function () {
  'use strict';

  // ── State ─────────────────────────────────────────────────────────────────
  let currentSmiles = '';

  // ── Builder canvas ────────────────────────────────────────────────────────
  const smilesDisplay = document.getElementById('smiles-display');
  const debugCheckbox = document.getElementById('debug-checkbox');
  const copyBtn       = document.getElementById('copy-smiles');

  const builder = new StructureBuilder('builder-canvas', function onSmileChange(smiles) {
    currentSmiles = smiles;
    smilesDisplay.textContent = smiles || '';
  });

  debugCheckbox.addEventListener('change', function () {
    builder.setDebugMode(this.checked);
  });

  copyBtn.addEventListener('click', function () {
    if (!currentSmiles) return;
    navigator.clipboard.writeText(currentSmiles).then(function () {
      const old = copyBtn.textContent;
      copyBtn.textContent = 'Copied!';
      setTimeout(() => { copyBtn.textContent = old; }, 1200);
    });
  });

  document.getElementById('btn-clear-canvas').addEventListener('click', function () {
    builder.clearCanvas();
  });

  // Tool palette
  document.querySelectorAll('.tool-btn[data-tool]').forEach(function (btn) {
    btn.addEventListener('click', function () {
      const tool = this.dataset.tool;
      document.querySelectorAll('.tool-btn[data-tool]').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      builder.setTool(tool);
    });
  });

  // ── Navigation ────────────────────────────────────────────────────────────
  const viewBuilder  = document.getElementById('view-builder');
  const viewReagents = document.getElementById('view-reagents');
  const navBuilder   = document.getElementById('nav-builder');
  const navReagents  = document.getElementById('nav-reagents');

  function showView(name) {
    if (name === 'builder') {
      viewBuilder.classList.add('active');
      viewReagents.classList.remove('active');
      navBuilder.classList.replace('secondary', 'primary');
      navReagents.classList.replace('primary', 'secondary');
    } else {
      viewReagents.classList.add('active');
      viewBuilder.classList.remove('active');
      navReagents.classList.replace('secondary', 'primary');
      navBuilder.classList.replace('primary', 'secondary');
    }
  }

  navBuilder.addEventListener('click',  () => showView('builder'));
  navReagents.addEventListener('click', () => showView('reagents'));

  // ── Generate Products (NaBH4) ─────────────────────────────────────────────
  document.getElementById('btn-generate').addEventListener('click', function () {
    const resultEl = document.getElementById('reaction-result');

    const smiles = currentSmiles && currentSmiles !== '(invalid)' ? currentSmiles : '';
    if (!smiles) {
      resultEl.innerHTML =
        '<div class="notice warn">Draw a molecule in the Structure Builder first, then come back here.</div>';
      return;
    }

    let result;
    try {
      result = applyReagent('NaBH4', smiles);
    } catch (err) {
      resultEl.innerHTML =
        '<div class="notice warn">Could not apply NaBH4: ' + escHtml(err.message) + '</div>';
      return;
    }

    if (!result.reactionFound) {
      resultEl.innerHTML =
        '<div class="notice info">No reducible C=O group found in the drawn structure. ' +
        'NaBH4 reduces aldehydes, ketones, and acid chlorides.</div>';
      return;
    }

    const info = result.info;

    resultEl.innerHTML = [
      '<div class="reaction-card">',
      '  <div class="reaction-card-title">', escHtml(info.reactionType), '</div>',
      '  <div class="reaction-card-subtitle">', escHtml(info.subtitle), '</div>',
      '  <div class="reaction-card-desc">', escHtml(info.description), '</div>',

      '  <div class="rxn-section-label">REACTANT</div>',
      '  <div class="rxn-mol-box">',
      '    <canvas id="rxn-reactant-canvas" width="640" height="240"></canvas>',
      '  </div>',
      '  <div class="rxn-smiles">', escHtml(smiles), '</div>',

      '  <div class="rxn-reagent-label">', escHtml(info.name), '</div>',
      '  <div class="rxn-arrow">&#x2192;</div>',

      '  <div class="rxn-product-row">',
      '    <div><span class="badge-major">MAJOR</span></div>',
      '    <div class="rxn-product-mol">',
      '      <div class="rxn-mol-box">',
      '        <canvas id="rxn-product-canvas" width="640" height="240"></canvas>',
      '      </div>',
      '      <div class="rxn-smiles">', escHtml(result.productSmiles), '</div>',
      '    </div>',
      '  </div>',
      '</div>'
    ].join('');

    // Render reactant molecule
    renderToCanvas('rxn-reactant-canvas', smiles);
    // Render product molecule
    renderToCanvas('rxn-product-canvas', result.productSmiles);
  });

  // ── Helpers ───────────────────────────────────────────────────────────────

  function renderToCanvas(canvasId, smiles) {
    try {
      const r = new ChemicalStructureRenderer(canvasId);
      r.draw(smiles);
    } catch (e) {
      const cvs = document.getElementById(canvasId);
      if (cvs) {
        const ctx = cvs.getContext('2d');
        ctx.fillStyle = '#c0392b';
        ctx.font = '12px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('Render error: ' + e.message, cvs.width / 2, cvs.height / 2);
      }
    }
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

})();
</script>

</body>
</html>
